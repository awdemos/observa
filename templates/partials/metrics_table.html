<table class="data-table">
  <thead>
    <tr>
      <th>PID</th>
      <th>Name</th>
      <th>CPU %</th>
      <th>Memory</th>
    </tr>
  </thead>
  <tbody id="processes-body">
    {% for p in summary.processes %}
    <tr>
      <td>{{ p.pid }}</td>
      <td>{{ p.name }}</td>
      <td>{{ p.cpu_pct }}</td>
      <td>{{ p.memory }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
